<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JEE Adv · Good Solves</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080810;
      --surface: #10101c;
      --surface2: #181828;
      --border: #ffffff0f;
      --accent: #ff4500;
      --accent2: #ff7043;
      --text: #e8e8f0;
      --muted: #55556a;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Outfit', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

    /* Header */
    header { margin-bottom: 2.5rem; }
    .logo-row { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.5rem; }
    .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 16px var(--accent); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    h1 { font-size: 1.8rem; font-weight: 900; letter-spacing: -1px; }
    h1 span { color: var(--accent); }
    .sub { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); margin-top: 0.3rem; }

    /* Controls */
    .controls {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.4rem 1.6rem;
      margin-bottom: 2rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-end;
    }
    .field { display: flex; flex-direction: column; gap: 0.4rem; }
    label { font-family: var(--mono); font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    input[type="date"] {
      background: var(--bg);
      border: 1px solid #ffffff18;
      border-radius: 8px;
      color: var(--text);
      padding: 0.5rem 0.9rem;
      font-family: var(--mono);
      font-size: 0.85rem;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    input[type="date"]:focus { border-color: var(--accent); }

    .btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      padding: 0.55rem 1.6rem;
      font-family: var(--sans);
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:hover { background: var(--accent2); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { background: #333; cursor: not-allowed; transform: none; }

    .status { font-family: var(--mono); font-size: 0.78rem; color: var(--muted); padding-bottom: 4px; }

    /* Loading */
    .loading { text-align: center; padding: 4rem 0; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #ffffff0f;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color: var(--muted); font-family: var(--mono); font-size: 0.85rem; }
    .loading strong { color: var(--accent); }

    /* Error */
    .error {
      background: #2a0a0a;
      border: 1px solid #ff444433;
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      color: #ff8888;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    /* Empty */
    .empty { text-align: center; padding: 4rem 0; color: var(--muted); }
    .empty .icon { font-size: 2.5rem; margin-bottom: 0.8rem; }

    /* Day group */
    .day-group { margin-bottom: 2.5rem; }
    .day-header {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 1rem;
    }
    .day-line { flex: 1; height: 1px; background: var(--border); }
    .day-label {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--accent2);
      font-weight: 700;
      white-space: nowrap;
      background: var(--bg);
      padding: 0 0.5rem;
    }

    /* Post card */
    .post {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 1rem;
      transition: border-color 0.2s, transform 0.15s;
    }
    .post:hover { border-color: #ff450033; transform: translateY(-2px); }

    .post-meta { padding: 1rem 1.3rem 0.6rem; }
    .post-title {
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      line-height: 1.5;
      display: block;
      transition: color 0.15s;
    }
    .post-title:hover { color: var(--accent2); }
    .post-info {
      margin-top: 0.4rem;
      display: flex; flex-wrap: wrap; gap: 0.8rem;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
    }

    /* Images */
    .post-images {
      padding: 0.5rem 1.3rem 1rem;
      display: flex; flex-wrap: wrap; gap: 0.5rem;
    }
    .post-images img {
      max-height: 260px;
      max-width: 100%;
      border-radius: 8px;
      cursor: zoom-in;
      object-fit: contain;
      background: var(--bg);
      border: 1px solid var(--border);
      transition: opacity 0.2s;
    }
    .post-images img:hover { opacity: 0.85; }
    .no-images { padding: 0.3rem 1.3rem 0.9rem; color: #333; font-size: 0.8rem; font-family: var(--mono); }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.93);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 92vw; max-height: 92vh; border-radius: 12px; object-fit: contain; box-shadow: 0 0 80px #ff450022; }
    #lightbox-close { position: absolute; top: 1.2rem; right: 1.5rem; color: #fff; font-size: 1.8rem; cursor: pointer; opacity: 0.6; transition: opacity 0.2s; }
    #lightbox-close:hover { opacity: 1; }

    /* Placeholder */
    .placeholder { text-align: center; padding: 5rem 0; color: var(--muted); }
    .placeholder .icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
    .placeholder p { font-family: var(--mono); font-size: 0.82rem; }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo-row">
      <div class="dot"></div>
      <h1>r/<span>JEEAdv26dailyupdates</span></h1>
    </div>
    <p class="sub">// flair: GOOD SOLVE · image viewer</p>
  </header>

  <div class="controls">
    <div class="field">
      <label>From</label>
      <input type="date" id="from-date"/>
    </div>
    <div class="field">
      <label>To</label>
      <input type="date" id="to-date"/>
    </div>
    <button class="btn" id="fetch-btn" onclick="fetchPosts()">⚡ Fetch Posts</button>
    <span class="status" id="status"></span>
  </div>

  <div id="content">
    <div class="placeholder">
      <div class="icon">📅</div>
      <p>Select a date range and click Fetch Posts</p>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()">
  <span id="lightbox-close" onclick="closeLightbox()">✕</span>
  <img id="lightbox-img" src="" alt=""/>
</div>

<script>
  // Set default dates
  const today = new Date();
  const fiveDaysAgo = new Date(today);
  fiveDaysAgo.setDate(today.getDate() - 5);

  document.getElementById("from-date").value = fiveDaysAgo.toISOString().slice(0, 10);
  document.getElementById("to-date").value = today.toISOString().slice(0, 10);

  async function fetchPosts() {
    const fromDate = document.getElementById("from-date").value;
    const toDate = document.getElementById("to-date").value;
    if (!fromDate || !toDate) return alert("Please select both dates.");

    const fromTs = Math.floor(new Date(fromDate).getTime() / 1000);
    const toTs = Math.floor(new Date(toDate).getTime() / 1000) + 86399;

    const btn = document.getElementById("fetch-btn");
    const status = document.getElementById("status");
    const content = document.getElementById("content");

    btn.disabled = true;
    btn.textContent = "Fetching...";
    status.textContent = "";
    content.innerHTML = `<div class="loading"><div class="spinner"></div><p>Scanning Reddit for <strong>GOOD SOLVEs</strong>...</p></div>`;

    try {
      const res = await fetch(`/api/posts?from_ts=${fromTs}&to_ts=${toTs}`);
      if (!res.ok) throw new Error(`Server error: ${res.status}`);
      const data = await res.json();

      if (data.error) throw new Error(data.error);

      const posts = data.posts;
      status.textContent = `${posts.length} post${posts.length !== 1 ? "s" : ""} found`;

      if (posts.length === 0) {
        content.innerHTML = `<div class="empty"><div class="icon">🔍</div><p>No posts found in this date range.</p></div>`;
        return;
      }

      // Group by date
      const grouped = {};
      for (const post of posts) {
        const day = new Date(post.created_utc * 1000).toLocaleDateString("en-IN", {
          weekday: "long", day: "numeric", month: "long", year: "numeric"
        });
        if (!grouped[day]) grouped[day] = [];
        grouped[day].push(post);
      }

      let html = "";
      for (const [day, dayPosts] of Object.entries(grouped)) {
        html += `<div class="day-group">
          <div class="day-header">
            <div class="day-line"></div>
            <span class="day-label">📅 ${day}</span>
            <div class="day-line"></div>
          </div>`;

        for (const post of dayPosts) {
          const time = new Date(post.created_utc * 1000).toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" });
          const imgHtml = post.images.length > 0
            ? `<div class="post-images">${post.images.map(src =>
                `<img src="${src}" loading="lazy" onclick="openLightbox('${src}')" onerror="this.style.display='none'"/>`
              ).join("")}</div>`
            : `<div class="no-images">// no images</div>`;

          html += `<div class="post">
            <div class="post-meta">
              <a class="post-title" href="https://reddit.com${post.permalink}" target="_blank">${escHtml(post.title)}</a>
              <div class="post-info">
                <span>👤 u/${escHtml(post.author)}</span>
                <span>🕐 ${time}</span>
                <span>⬆️ ${post.score}</span>
                ${post.images.length > 0 ? `<span>🖼️ ${post.images.length} image${post.images.length > 1 ? "s" : ""}</span>` : ""}
              </div>
            </div>
            ${imgHtml}
          </div>`;
        }
        html += "</div>";
      }
      content.innerHTML = html;

    } catch (e) {
      content.innerHTML = `<div class="error">⚠️ ${e.message}<br><small style="color:#888;margin-top:0.4rem;display:block">Something went wrong fetching posts. Please try again.</small></div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = "⚡ Fetch Posts";
    }
  }

  function escHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function openLightbox(src) {
    document.getElementById("lightbox-img").src = src;
    document.getElementById("lightbox").classList.add("open");
  }
  function closeLightbox() {
    document.getElementById("lightbox").classList.remove("open");
    document.getElementById("lightbox-img").src = "";
  }
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeLightbox(); });
</script>
</body>
</html>
