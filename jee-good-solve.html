<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>JEE Solve App</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet"/>
  <style>
    :root { --bg: #080810; --accent: #ff4500; --text: #e8e8f0; }
    body { 
      background: var(--bg); color: var(--text); 
      font-family: 'Outfit', sans-serif; display: flex; 
      flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; margin: 0; overflow: hidden;
    }
    .card {
      background: #10101c; border: 1px solid #ffffff0f;
      padding: 2.5rem; border-radius: 24px; text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4); width: 90%; max-width: 400px;
    }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    h1 span { color: var(--accent); }
    p { color: #55556a; margin-bottom: 2rem; font-size: 0.9rem; }
    .btn {
      background: var(--accent); color: white; border: none;
      padding: 1.2rem 2rem; border-radius: 12px; font-weight: 900;
      font-size: 1.1rem; cursor: pointer; width: 100%;
      transition: transform 0.1s;
    }
    .btn:active { transform: scale(0.95); }
  </style>
</head>
<body>

<div class="card">
  <h1>JEE <span>Solves</span></h1>
  <p>Automated Search for r/JEEAdv26dailyupdates</p>
  
  <button class="btn" onclick="launchReddit()">🚀 OPEN SEARCH IN APP</button>
</div>

<script>
  function launchReddit() {
    const sub = "JEEAdv26dailyupdates";
    const query = encodeURIComponent('flair:"GOOD SOLVE"');
    
    // Attempt to open the official Reddit app directly
    const deepLink = `reddit://www.reddit.com/r/${sub}/search?q=${query}&restrict_sr=1&sort=new`;
    const fallback = `https://www.reddit.com/r/${sub}/search?q=${query}&restrict_sr=1&sort=new`;

    window.location.href = deepLink;

    // Fallback if app isn't installed or fails to trigger
    setTimeout(() => {
      if (!document.hidden) {
        window.open(fallback, "_blank");
      }
    }, 1500);
  }
</script>

</body>
</html>
